<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>J.A.R.V.I.S — Personal Productivity System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  /* ============================================
     STARK INDUSTRIES / AVENGERS HUD THEME — LIGHT
     Iron Man inspired, daylight-readable
     ============================================ */
  :root {
    --stark-red: #C8102E;
    --stark-red-bright: #E63946;
    --stark-gold: #D4A017;
    --stark-gold-bright: #F4B400;
    --hud-blue: #0066CC;
    --hud-blue-bright: #1E88E5;
    --bg-light: #F5F7FA;
    --bg-card: #FFFFFF;
    --bg-mid: #EDF1F7;
    --bg-tint: #E8EEF6;
    --text-dark: #0D1B2A;
    --text-mid: #2C3E50;
    --text-dim: #6B7C93;
    --text-light: #8FA3BD;
    --border: rgba(0, 102, 204, 0.15);
    --border-strong: rgba(0, 102, 204, 0.35);
    --grid-line: rgba(0, 102, 204, 0.05);
    --warn: #D4A017;
    --danger: #C8102E;
    --success: #00875A;
    --shadow: 0 2px 8px rgba(13, 27, 42, 0.06);
    --shadow-lg: 0 4px 20px rgba(13, 27, 42, 0.1);
  }
  
  *,*::before,*::after{box-sizing:border-box}
  
  body{
    margin:0;
    font-family:'Rajdhani','Segoe UI',sans-serif;
    background:var(--bg-light);
    color:var(--text-dark);
    min-height:100vh;
    padding:16px;
    position:relative;
    overflow-x:hidden;
  }
  
  /* === SUBTLE HUD GRID BACKGROUND === */
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
    z-index:0;
    mask-image:radial-gradient(ellipse at center, black 30%, transparent 80%);
  }
  
  /* === SOFT RADIAL ACCENTS === */
  body::after{
    content:'';
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 15% 20%, rgba(0,102,204,0.04) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(200,16,46,0.03) 0%, transparent 40%),
      radial-gradient(circle at 50% 100%, rgba(212,160,23,0.03) 0%, transparent 50%);
    pointer-events:none;
    z-index:0;
  }
  
  .container{
    max-width:1300px;
    margin:0 auto;
    position:relative;
    z-index:1;
  }

  /* ============ HEADER ============ */
  .header{
    display:flex;
    align-items:center;
    gap:18px;
    margin-bottom:20px;
    padding:20px 28px;
    background:linear-gradient(135deg, #FFFFFF 0%, var(--bg-mid) 100%);
    border:1px solid var(--border);
    box-shadow:var(--shadow);
    position:relative;
    clip-path:polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
  }
  
  .header::before, .header::after{
    content:'';
    position:absolute;
    width:20px;
    height:20px;
    border:2px solid var(--stark-gold);
  }
  .header::before{
    top:6px; left:6px;
    border-right:none;
    border-bottom:none;
  }
  .header::after{
    bottom:6px; right:6px;
    border-left:none;
    border-top:none;
  }
  
  /* === ARC REACTOR === */
  .arc-reactor{
    width:60px;
    height:60px;
    border-radius:50%;
    background:
      radial-gradient(circle, #FFFFFF 0%, #4FC3F7 20%, var(--hud-blue) 50%, #003D7A 100%);
    box-shadow:
      0 0 20px rgba(0,102,204,0.5),
      0 0 40px rgba(0,102,204,0.3),
      inset 0 0 12px rgba(255,255,255,0.6);
    flex-shrink:0;
    position:relative;
    animation:reactor-pulse 2s ease-in-out infinite;
  }
  
  .arc-reactor::before{
    content:'';
    position:absolute;
    inset:-8px;
    border-radius:50%;
    border:2px solid var(--stark-gold);
    border-right-color:transparent;
    border-bottom-color:transparent;
    animation:rotate 4s linear infinite;
  }
  .arc-reactor::after{
    content:'';
    position:absolute;
    inset:30%;
    border-radius:50%;
    background:#FFFFFF;
    box-shadow:0 0 12px #FFFFFF, 0 0 24px rgba(0,102,204,0.6);
  }
  
  /* Listening state for voice */
  .arc-reactor.listening{
    animation:listening-pulse 0.8s ease-in-out infinite;
  }
  .arc-reactor.listening::before{
    border-color:var(--stark-red);
    border-right-color:transparent;
    animation:rotate 1s linear infinite;
  }
  
  @keyframes reactor-pulse{
    0%,100%{box-shadow:0 0 20px rgba(0,102,204,0.5),0 0 40px rgba(0,102,204,0.3),inset 0 0 12px rgba(255,255,255,0.6)}
    50%{box-shadow:0 0 30px rgba(0,102,204,0.7),0 0 60px rgba(0,102,204,0.4),inset 0 0 18px rgba(255,255,255,0.8)}
  }
  
  @keyframes listening-pulse{
    0%,100%{box-shadow:0 0 25px rgba(200,16,46,0.6),0 0 50px rgba(200,16,46,0.4),inset 0 0 15px rgba(255,255,255,0.7);transform:scale(1)}
    50%{box-shadow:0 0 40px rgba(200,16,46,0.9),0 0 80px rgba(200,16,46,0.6),inset 0 0 20px rgba(255,255,255,0.9);transform:scale(1.05)}
  }
  
  @keyframes rotate{
    from{transform:rotate(0deg)}
    to{transform:rotate(360deg)}
  }
  
  .header-text{flex:1}
  h1{
    margin:0;
    font-family:'Orbitron',sans-serif;
    font-size:26px;
    font-weight:900;
    letter-spacing:6px;
    color:var(--text-dark);
    position:relative;
  }
  h1 .accent-gold{
    background:linear-gradient(90deg, var(--stark-gold) 0%, var(--stark-gold-bright) 50%, var(--stark-gold) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  
  .tagline{
    color:var(--hud-blue);
    font-family:'Share Tech Mono',monospace;
    font-size:11px;
    margin-top:4px;
    letter-spacing:3px;
    text-transform:uppercase;
    opacity:0.85;
  }
  .tagline::before{content:'> '}
  .tagline::after{content:' _'; animation:blink 1s step-end infinite}
  
  @keyframes blink{50%{opacity:0}}
  
  .header-stats{
    display:flex;
    gap:14px;
    font-size:12px;
  }
  .stat{
    text-align:center;
    padding:8px 16px;
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:2px;
    box-shadow:var(--shadow);
  }
  .stat-value{
    font-family:'Orbitron',sans-serif;
    font-size:22px;
    font-weight:700;
    color:var(--hud-blue);
    line-height:1;
  }
  .stat-label{
    color:var(--text-dim);
    letter-spacing:2px;
    font-size:9px;
    text-transform:uppercase;
    margin-top:4px;
    font-family:'Share Tech Mono',monospace;
  }
  
  /* === VOICE TOGGLE BUTTON === */
  .voice-toggle{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 18px;
    background:linear-gradient(135deg, var(--stark-red) 0%, #8B0A20 100%);
    color:#FFFFFF;
    border:none;
    font-family:'Orbitron',sans-serif;
    font-size:11px;
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
    cursor:pointer;
    transition:all 0.2s;
    box-shadow:var(--shadow);
    clip-path:polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
  }
  .voice-toggle:hover{
    background:linear-gradient(135deg, var(--stark-red-bright), var(--stark-red));
    box-shadow:0 4px 12px rgba(200,16,46,0.3);
  }
  .voice-toggle.active{
    background:linear-gradient(135deg, var(--success), #00A86B);
    animation:voice-glow 1.5s ease-in-out infinite;
  }
  @keyframes voice-glow{
    0%,100%{box-shadow:0 0 10px rgba(0,135,90,0.4)}
    50%{box-shadow:0 0 20px rgba(0,135,90,0.7)}
  }
  .voice-toggle .mic-icon{
    width:14px; height:14px;
    background:currentColor;
    -webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2a3 3 0 00-3 3v6a3 3 0 006 0V5a3 3 0 00-3-3zM7 11a5 5 0 0010 0h2a7 7 0 01-6 6.93V21h-2v-3.07A7 7 0 015 11h2z'/></svg>") center/contain no-repeat;
    mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2a3 3 0 00-3 3v6a3 3 0 006 0V5a3 3 0 00-3-3zM7 11a5 5 0 0010 0h2a7 7 0 01-6 6.93V21h-2v-3.07A7 7 0 015 11h2z'/></svg>") center/contain no-repeat;
  }

  /* ============ TABS ============ */
  .tabs{
    display:flex;
    gap:2px;
    margin-bottom:16px;
    padding:6px;
    background:var(--bg-card);
    border:1px solid var(--border);
    box-shadow:var(--shadow);
    overflow-x:auto;
    position:relative;
    clip-path:polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
  }
  .tab{
    flex:1;
    min-width:fit-content;
    padding:11px 18px;
    background:transparent;
    border:none;
    color:var(--text-mid);
    font-family:'Rajdhani',sans-serif;
    font-size:13px;
    font-weight:600;
    letter-spacing:2px;
    cursor:pointer;
    text-transform:uppercase;
    transition:all 0.2s;
    white-space:nowrap;
    position:relative;
  }
  .tab:hover{
    color:var(--hud-blue);
    background:var(--bg-tint);
  }
  .tab.active{
    background:linear-gradient(180deg, rgba(212,160,23,0.15), rgba(200,16,46,0.08));
    color:var(--stark-red);
    border-bottom:2px solid var(--stark-gold);
  }
  .tab.active::before{
    content:'◆';
    position:absolute;
    top:-3px;
    left:50%;
    transform:translateX(-50%);
    color:var(--stark-gold);
    font-size:8px;
  }

  /* ============ PANELS ============ */
  .panel{
    background:var(--bg-card);
    border:1px solid var(--border);
    padding:22px;
    margin-bottom:16px;
    box-shadow:var(--shadow);
    position:relative;
    clip-path:polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
  }
  
  .panel::before{
    content:'';
    position:absolute;
    top:0; left:0;
    width:30px; height:2px;
    background:linear-gradient(90deg, var(--hud-blue), transparent);
  }
  .panel::after{
    content:'';
    position:absolute;
    top:0; left:0;
    width:2px; height:30px;
    background:linear-gradient(180deg, var(--hud-blue), transparent);
  }
  
  .panel-title{
    font-family:'Orbitron',sans-serif;
    font-size:13px;
    font-weight:700;
    color:var(--stark-red);
    letter-spacing:3px;
    margin:0 0 16px;
    padding-bottom:12px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    gap:10px;
    text-transform:uppercase;
  }
  .panel-title::before{
    content:'▸';
    color:var(--stark-gold);
    font-size:14px;
  }
  .panel-title .panel-action{
    margin-left:auto;
    font-size:11px;
    letter-spacing:1px;
  }
  .view{display:none}
  .view.active{display:block}

  /* ============ FORMS ============ */
  .form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-bottom:16px;
  }
  @media(max-width:700px){.form-grid{grid-template-columns:1fr}}
  .form-grid.full{grid-template-columns:1fr}
  .form-field label{
    display:block;
    font-family:'Share Tech Mono',monospace;
    font-size:10px;
    color:var(--hud-blue);
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:6px;
    font-weight:600;
  }
  .form-field label::before{content:'[ '}
  .form-field label::after{content:' ]'}
  
  input,select,textarea{
    width:100%;
    padding:10px 14px;
    background:var(--bg-light);
    border:1px solid var(--border);
    color:var(--text-dark);
    font-family:'Rajdhani',sans-serif;
    font-size:14px;
    font-weight:500;
    outline:none;
    transition:all 0.2s;
    border-radius:0;
    letter-spacing:0.3px;
  }
  input:focus,select:focus,textarea:focus{
    border-color:var(--hud-blue);
    box-shadow:0 0 0 3px rgba(0,102,204,0.1);
    background:#FFFFFF;
  }
  input::placeholder,textarea::placeholder{color:var(--text-light)}
  textarea{resize:vertical;min-height:70px;font-family:'Rajdhani',sans-serif}
  select{cursor:pointer}
  select option{background:#FFFFFF;color:var(--text-dark)}

  /* ============ BUTTONS ============ */
  .btn{
    padding:10px 22px;
    background:linear-gradient(135deg, var(--stark-red), #A00D24);
    color:#FFFFFF;
    border:none;
    font-family:'Orbitron',sans-serif;
    font-weight:700;
    cursor:pointer;
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    transition:all 0.2s;
    position:relative;
    box-shadow:var(--shadow);
    clip-path:polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
  }
  .btn:hover{
    background:linear-gradient(135deg, var(--stark-red-bright), var(--stark-red));
    box-shadow:0 4px 14px rgba(200,16,46,0.35);
    transform:translateY(-1px);
  }
  .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
  
  .btn-secondary{
    background:var(--bg-card);
    color:var(--hud-blue);
    border:1px solid var(--border-strong);
  }
  .btn-secondary:hover{
    background:var(--bg-tint);
    box-shadow:0 4px 10px rgba(0,102,204,0.15);
  }
  .btn-danger{
    background:linear-gradient(135deg, var(--danger), #8B0A20);
  }
  .btn-sm{padding:6px 14px;font-size:10px}

  /* ============ TYPE PICKER ============ */
  .type-picker{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:18px;
  }
  .type-btn{
    padding:18px 14px;
    background:var(--bg-light);
    border:1px solid var(--border);
    color:var(--text-mid);
    cursor:pointer;
    text-align:center;
    transition:all 0.25s;
    font-family:'Orbitron',sans-serif;
    position:relative;
    clip-path:polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
  }
  .type-btn:hover{
    background:var(--bg-tint);
    color:var(--hud-blue);
    border-color:var(--hud-blue);
  }
  .type-btn.selected{
    background:linear-gradient(135deg, rgba(212,160,23,0.15), rgba(200,16,46,0.08));
    border-color:var(--stark-gold);
    color:var(--stark-red);
    box-shadow:0 4px 12px rgba(212,160,23,0.2);
  }
  .type-btn .emoji{font-size:28px;display:block;margin-bottom:6px}
  .type-btn .label{font-size:11px;font-weight:700;letter-spacing:2px}

  /* ============ TASK LIST ============ */
  .task-list{display:flex;flex-direction:column;gap:8px}
  .task-item{
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 16px;
    background:var(--bg-light);
    border-left:3px solid var(--hud-blue);
    transition:all 0.2s;
    position:relative;
  }
  .task-item:hover{
    background:var(--bg-tint);
    box-shadow:inset 0 0 0 1px var(--border);
  }
  .task-item.completed{
    opacity:0.55;
    border-left-color:var(--success);
    background:#F0F9F4;
  }
  .task-item.overdue{
    border-left-color:var(--danger);
    background:#FDF3F5;
  }
  .task-item.completed .task-title{text-decoration:line-through}
  
  .task-checkbox{
    width:22px;height:22px;
    border:2px solid var(--hud-blue);
    cursor:pointer;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:#FFFFFF;
    transition:all 0.2s;
    position:relative;
  }
  .task-checkbox:hover{box-shadow:0 0 0 3px rgba(0,102,204,0.15)}
  .task-checkbox.checked{
    background:var(--success);
    border-color:var(--success);
  }
  .task-checkbox.checked::after{content:'✓';color:#FFFFFF;font-weight:bold;font-size:14px}
  
  .task-info{flex:1;min-width:0}
  .task-title{
    font-family:'Rajdhani',sans-serif;
    font-size:15px;
    color:var(--text-dark);
    margin-bottom:4px;
    font-weight:600;
    letter-spacing:0.3px;
  }
  .task-meta{font-size:11px;color:var(--text-dim);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .task-meta span{display:inline-flex;align-items:center;gap:3px}
  .task-actions{display:flex;gap:4px}
  
  .icon-btn{
    background:transparent;
    border:1px solid var(--border);
    color:var(--text-dim);
    width:28px;height:28px;
    cursor:pointer;
    font-size:14px;
    display:flex;align-items:center;justify-content:center;
    transition:all 0.2s;
  }
  .icon-btn:hover{background:var(--bg-tint);color:var(--hud-blue)}
  .icon-btn.delete:hover{background:#FDF3F5;color:var(--danger);border-color:var(--danger)}

  /* ============ BADGES ============ */
  .badge{
    display:inline-block;
    font-family:'Share Tech Mono',monospace;
    font-size:10px;
    padding:3px 10px;
    letter-spacing:1px;
    text-transform:uppercase;
    font-weight:700;
    clip-path:polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
  }
  .badge-meeting{background:#F3E8FD;color:#7C3AED;border:1px solid #DDD0FF}
  .badge-deliverable{background:#E3F2FD;color:var(--hud-blue);border:1px solid #B3DDF7}
  .badge-learning{background:#FFF8E1;color:#B8860B;border:1px solid #F4D578}
  .badge-high{background:#FFE5EA;color:var(--danger);border:1px solid #FFB3C0}
  .badge-medium{background:#FFF8E1;color:#B8860B;border:1px solid #F4D578}
  .badge-low{background:#E8F5E9;color:var(--success);border:1px solid #B5D9BC}
  .badge-overdue{
    background:#FFE5EA;
    color:var(--danger);
    border:1px solid var(--danger);
    animation:pulse-badge 1.5s ease-in-out infinite;
  }
  @keyframes pulse-badge{
    0%,100%{opacity:1;box-shadow:0 0 0 rgba(200,16,46,0)}
    50%{opacity:0.7;box-shadow:0 0 12px rgba(200,16,46,0.3)}
  }

  /* ============ DASHBOARD GRID ============ */
  .dashboard-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:14px;
    margin-bottom:16px;
  }
  .stat-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    padding:20px;
    position:relative;
    box-shadow:var(--shadow);
    clip-path:polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
    transition:all 0.2s;
  }
  .stat-card:hover{
    border-color:var(--hud-blue);
    box-shadow:var(--shadow-lg);
  }
  .stat-card::before{
    content:'';
    position:absolute;
    top:0; left:0;
    width:40%; height:2px;
    background:var(--hud-blue);
  }
  .stat-card .number{
    font-family:'Orbitron',sans-serif;
    font-size:34px;
    font-weight:900;
    color:var(--hud-blue);
    margin:8px 0;
    line-height:1;
  }
  .stat-card .label{
    font-family:'Share Tech Mono',monospace;
    font-size:10px;
    color:var(--text-dim);
    letter-spacing:2px;
    text-transform:uppercase;
    font-weight:600;
  }
  .stat-card.warning .number{color:var(--stark-gold)}
  .stat-card.warning::before{background:var(--stark-gold)}
  .stat-card.danger .number{color:var(--danger)}
  .stat-card.danger::before{background:var(--danger)}
  .stat-card.success .number{color:var(--success)}
  .stat-card.success::before{background:var(--success)}

  /* ============ AGENT MESSAGES ============ */
  .agent-message{
    padding:16px 18px;
    background:var(--bg-light);
    border-left:3px solid var(--hud-blue);
    margin-bottom:12px;
    animation:slideIn 0.4s ease;
    position:relative;
  }
  .agent-message::before{
    content:'';
    position:absolute;
    top:0; right:0;
    width:60px; height:1px;
    background:linear-gradient(90deg, transparent, var(--hud-blue));
  }
  @keyframes slideIn{
    from{opacity:0;transform:translateX(-15px)}
    to{opacity:1;transform:translateX(0)}
  }
  .agent-message.tracker{
    border-left-color:var(--hud-blue);
    background:linear-gradient(90deg, #E3F2FD, var(--bg-light));
  }

  .agent-header{

  /* ============ MISC ============ */

    text-align:center;
    margin-top:28px;

  .footer .arc-mini{

  .filter-chip{

    font-family:'Share Tech Mono',monospace;

    letter-spacing:1px;

    font-weight:600;
    clip-path:polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);

  /* === VOICE LISTENING OVERLAY === */
  .voice-overlay{

    padding:16px 24px;
    box-shadow:0 8px 32px rgba(200,16,46,0.25);

  @keyframes slideUp{

</style>

<body>
<div class="container">

  <!-- ============ HEADER ============ -->
  <div class="header">
    <div class="arc-reactor" id="arc-reactor"></div>
    <div class="header-text">
      <h1>J.A.R.V.I.S</h1>
      <div class="tagline">STARK INDUSTRIES // OPERATIONS PROTOCOL v2.0</div>
    </div>
    <div class="header-stats">
      <div class="stat">
        <div class="stat-value" id="header-today">0</div>
        <div class="stat-label">Today</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="header-pending">0</div>
        <div class="stat-label">Pending</div>
      </div>

  <div id="view-analyst" class="view"></div>
  <div id="view-settings" class="view"></div>

  <div class="footer">
    <span class="arc-mini"></span>
    STARK INDUSTRIES SECURE PROTOCOL · LOCAL ENCRYPTION ACTIVE · ALL SYSTEMS NOMINAL
    <span class="arc-mini"></span>
  </div>
</div>

<!-- Voice listening overlay -->
<div class="voice-overlay" id="voice-overlay">
  <span class="pulse-dot"></span>
  <span>Listening</span>
  <span class="transcript" id="voice-transcript"></span>
</div>

<script>
// ============ APP STATE ============
const STORAGE_KEY = 'jarvis_personal_v1';
let state = loadState();

function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e){console.error(e)}
  return {
    tasks: [],
    settings: {
      userName: 'Sir',
      workHoursPerDay: 8,
      goals: ''
    },
    createdAt: new Date().toISOString()
  };
}

function saveState(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e){console.error(e)}
}

function uid(){return Date.now().toString(36) + Math.random().toString(36).substr(2,5)}

// ============ DATE HELPERS ============
function today(){return new Date().toISOString().split('T')[0]}
function isToday(dateStr){return dateStr && dateStr.split('T')[0] === today()}
function isThisWeek(dateStr){
  if(!dateStr) return false;
  const d = new Date(dateStr);
  const now = new Date();
  const start = new Date(now);
  start.setDate(now.getDate() - now.getDay());
  start.setHours(0,0,0,0);
  return d >= start && d <= now;
}
function isOverdue(task){
  if(!task.dueDate || task.completed) return false;
  return new Date(task.dueDate) < new Date(today());
}
function daysAgo(dateStr){
  if(!dateStr) return null;
  const diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / (1000*60*60*24));
  return diff;
}
function formatDate(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-GB', {day:'2-digit', month:'short'});
}
function todayLabel(){
  return new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
}

// ============ TASK FILTERS ============
function getTasks(filter){
  let tasks = state.tasks.slice();
  if(filter==='today'){
    tasks = tasks.filter(t => (t.dueDate && isToday(t.dueDate)) || isToday(t.createdAt));
  } else if(filter==='pending'){
    tasks = tasks.filter(t => !t.completed);
  } else if(filter==='overdue'){
    tasks = tasks.filter(t => isOverdue(t));
  } else if(filter==='completed'){
    tasks = tasks.filter(t => t.completed);
  } else if(filter==='week'){
    tasks = tasks.filter(t => isThisWeek(t.completedAt) || isThisWeek(t.createdAt));
  }
  return tasks.sort((a,b) => {
    if(a.completed !== b.completed) return a.completed ? 1 : -1;
    if(a.dueDate && b.dueDate) return new Date(a.dueDate) - new Date(b.dueDate);
    if(a.dueDate) return -1;
    if(b.dueDate) return 1;
    return new Date(b.createdAt) - new Date(a.createdAt);
  });
}

function updateHeaderStats(){
  document.getElementById('header-today').textContent =
    state.tasks.filter(t => isToday(t.dueDate) || (isToday(t.createdAt) && !t.completed)).length;
  document.getElementById('header-pending').textContent =
    state.tasks.filter(t => !t.completed).length;
  document.getElementById('header-week').textContent =
    state.tasks.filter(t => isThisWeek(t.completedAt)).length;
}

// ============ RENDER: TASK ITEM (shared) ============
function renderTaskItem(task){
  const overdue = isOverdue(task);
  const typeBadge = task.type === 'meeting' ? '<span class="badge badge-meeting">Meeting</span>'
                  : task.type === 'learning' ? '<span class="badge badge-learning">Learning</span>'
                  : '<span class="badge badge-deliverable">Deliverable</span>';
  const priorityBadge = task.priority === 'high' ? '<span class="badge badge-high">High</span>'
                      : task.priority === 'low' ? '<span class="badge badge-low">Low</span>'
                      : '<span class="badge badge-medium">Med</span>';
  const overdueBadge = overdue ? '<span class="badge badge-overdue">Overdue</span>' : '';
  const dueLine = task.dueDate ? `📅 ${formatDate(task.dueDate)}` : '';
  const timeLine = task.timeSpent ? `⏱ ${task.timeSpent}h` : '';
  const projectLine = task.project ? `📁 ${escapeHtml(task.project)}` : '';
  
  return `
    <div class="task-item ${task.completed ? 'completed' : ''} ${overdue ? 'overdue' : ''}">
      <div class="task-checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask('${task.id}')"></div>
      <div class="task-info">
        <div class="task-title">${escapeHtml(task.title)}</div>
        <div class="task-meta">
          ${typeBadge}
          ${priorityBadge}
          ${overdueBadge}
          ${projectLine ? `<span>${projectLine}</span>` : ''}
          ${dueLine ? `<span>${dueLine}</span>` : ''}
          ${timeLine ? `<span>${timeLine}</span>` : ''}
        </div>
      </div>
      <div class="task-actions">
        <button class="icon-btn delete" onclick="deleteTask('${task.id}')" title="Delete">×</button>
      </div>
    </div>
  `;
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ============ TASK ACTIONS ============
window.toggleTask = function(id){
  const t = state.tasks.find(x => x.id === id);
  if(!t) return;
  t.completed = !t.completed;
  t.completedAt = t.completed ? new Date().toISOString() : null;
  saveState();
  renderCurrentView();
  updateHeaderStats();
};

window.deleteTask = function(id){
  if(!confirm('Delete this task?')) return;
  state.tasks = state.tasks.filter(t => t.id !== id);
  saveState();
  renderCurrentView();
  updateHeaderStats();
};

window.showView = function(name){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const tab = document.querySelector(`.tab[data-view="${name}"]`);
  if(tab) tab.classList.add('active');
  document.getElementById('view-' + name).classList.add('active');
  renderCurrentView();
};

// ============ VIEW: DASHBOARD ============
function renderDashboard(){
  const todayTasks = state.tasks.filter(t => isToday(t.dueDate) || (isToday(t.createdAt) && !t.completed));
  const pending = state.tasks.filter(t => !t.completed);
  const overdue = state.tasks.filter(t => isOverdue(t));
  const completedThisWeek = state.tasks.filter(t => isThisWeek(t.completedAt));
  const hoursThisWeek = completedThisWeek.reduce((s,t) => s + (parseFloat(t.timeSpent) || 0), 0);
  
  const weekByType = {meeting:0, deliverable:0, learning:0};
  completedThisWeek.forEach(t => weekByType[t.type] = (weekByType[t.type] || 0) + 1);
  
  let agentMessages = '';
  
  if(overdue.length > 0){
    agentMessages += `
      <div class="agent-message tracker">
        <div class="agent-header">📋 <span class="agent-name">Tracker</span></div>
        <div class="agent-body">
          <strong>Sir, you have ${overdue.length} overdue ${overdue.length===1?'task':'tasks'}.</strong>
          <ul>
            ${overdue.slice(0,3).map(t => `<li>${escapeHtml(t.title)} — ${daysAgo(t.dueDate)} ${daysAgo(t.dueDate)===1?'day':'days'} late</li>`).join('')}
          </ul>
        </div>
      </div>
    `;
  } else if(pending.length > 0){
    agentMessages += `
      <div class="agent-message tracker">
        <div class="agent-header">📋 <span class="agent-name">Tracker</span></div>
        <div class="agent-body">
          ${pending.length} ${pending.length===1?'task is':'tasks are'} pending. ${todayTasks.length > 0 ? `<strong>${todayTasks.length}</strong> due today.` : 'Nothing scheduled for today.'}
        </div>
      </div>
    `;
  }
  
  if(todayTasks.filter(t => !t.completed).length > 0){
    const next = todayTasks.find(t => !t.completed);
    let coachTip = '';
    if(next.type === 'meeting'){
      coachTip = `Prep 10 minutes before. Send a brief agenda. Set a hard end time.`;
    } else if(next.type === 'deliverable'){
      coachTip = `Block 90 minutes of deep work. Silence notifications. Define "done" before starting.`;
    } else {
      coachTip = `Active learning beats passive — write notes, build something, or teach it to someone after.`;
    }
    agentMessages += `
      <div class="agent-message coach">
        <div class="agent-header">💡 <span class="agent-name">Coach</span></div>
        <div class="agent-body">
          <strong>Next up:</strong> ${escapeHtml(next.title)}<br>
          ${coachTip}
        </div>
      </div>
    `;
  }
  
  if(completedThisWeek.length > 0){
    const dailyAvg = (completedThisWeek.length / 7).toFixed(1);
    agentMessages += `
      <div class="agent-message analyst">
        <div class="agent-header">📈 <span class="agent-name">Analyst</span></div>
        <div class="agent-body">
          You've completed <strong>${completedThisWeek.length}</strong> tasks this week (${dailyAvg}/day avg) and logged <strong>${hoursThisWeek.toFixed(1)}h</strong>.
          Mix: ${weekByType.meeting} meetings · ${weekByType.deliverable} deliverables · ${weekByType.learning} learning.
        </div>
      </div>
    `;
  }
  
  if(!agentMessages){
    agentMessages = `
      <div class="empty">
        <div class="icon">🤖</div>
        <div>Welcome, Sir. Add your first task to begin.</div>
      </div>
    `;
  }
  
  let todayList = '';
  if(todayTasks.length > 0){
    todayList = `<div class="task-list">${todayTasks.slice(0,5).map(renderTaskItem).join('')}</div>`;
  } else {
    todayList = `<div class="empty"><div>Nothing scheduled for today. Enjoy the calm, Sir.</div></div>`;
  }
  
  document.getElementById('view-dashboard').innerHTML = `
    <div class="panel">
      <div class="panel-title">🤖 AGENT BRIEFING · ${todayLabel().toUpperCase()}</div>
      ${agentMessages}
    </div>
    
    <div class="dashboard-grid">
      <div class="stat-card"><div class="label">Today</div><div class="number">${todayTasks.length}</div></div>
      <div class="stat-card warning"><div class="label">Pending</div><div class="number">${pending.length}</div></div>
      <div class="stat-card ${overdue.length > 0 ? 'danger' : ''}"><div class="label">Overdue</div><div class="number">${overdue.length}</div></div>
      <div class="stat-card success"><div class="label">Done This Week</div><div class="number">${completedThisWeek.length}</div></div>
    </div>
    
    <div class="panel">
      <div class="panel-title">📋 TODAY'S FOCUS
        <button class="btn btn-secondary btn-sm panel-action" onclick="showView('capture')">+ Add Task</button>
      </div>
      ${todayList}
    </div>
  `;
}

// ============ VIEW: CAPTURE (LOG WORK) ============
let captureType = 'deliverable';

function renderCapture(){
  document.getElementById('view-capture').innerHTML = `
    <div class="panel">
      <div class="panel-title">➕ LOG NEW WORK</div>
      
      <div class="type-picker">
        <button class="type-btn ${captureType==='meeting'?'selected':''}" onclick="setCaptureType('meeting')">
          <span class="emoji">👥</span>
          <span class="label">MEETING</span>
        </button>
        <button class="type-btn ${captureType==='deliverable'?'selected':''}" onclick="setCaptureType('deliverable')">
          <span class="emoji">📦</span>
          <span class="label">DELIVERABLE</span>
        </button>
        <button class="type-btn ${captureType==='learning'?'selected':''}" onclick="setCaptureType('learning')">
          <span class="emoji">📚</span>
          <span class="label">LEARNING</span>
        </button>
      </div>
      
      <div class="form-grid full">
        <div class="form-field">
          <label>Title *</label>
          <input type="text" id="cap-title" placeholder="${captureType==='meeting'?'e.g. Sync with design team':captureType==='learning'?'e.g. Read 2 chapters of System Design':'e.g. Send Q3 proposal to client'}" />
        </div>
      </div>
      
      <div class="form-grid">
        <div class="form-field">
          <label>Project / Context</label>
          <input type="text" id="cap-project" placeholder="optional" />
        </div>
        <div class="form-field">
          <label>Priority</label>
          <select id="cap-priority">
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="low">Low</option>
          </select>
        </div>
      </div>
      
      <div class="form-grid">
        <div class="form-field">
          <label>Due Date</label>
          <input type="date" id="cap-due" />
        </div>
        <div class="form-field">
          <label>Est. Time (hours)</label>
          <input type="number" id="cap-time" step="0.5" min="0" placeholder="e.g. 1.5" />
        </div>
      </div>
      
      <div class="form-grid full">
        <div class="form-field">
          <label>Notes / Outcome</label>
          <textarea id="cap-notes" placeholder="What's this about? What does success look like?"></textarea>
        </div>
      </div>
      
      <div class="row">
        <button class="btn" onclick="addTask()">SAVE TASK</button>
        <button class="btn btn-secondary" onclick="clearCaptureForm()">CLEAR</button>
        <div style="margin-left:auto;font-size:11px;color:#5a6f93">Tip: Set due date to today for instant focus</div>
      </div>
    </div>
    
    <div class="panel">
      <div class="panel-title">⚡ QUICK ADD (3 of each type)</div>
      <div style="font-size:12px;color:#8fa3c7;margin-bottom:12px">Click any template to pre-fill the form above:</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px">
        <button class="btn btn-secondary" style="text-align:left" onclick="quickAdd('meeting','1:1 with manager')">👥 1:1 with manager</button>
        <button class="btn btn-secondary" style="text-align:left" onclick="quickAdd('meeting','Team standup')">👥 Team standup</button>
        <button class="btn btn-secondary" style="text-align:left" onclick="quickAdd('meeting','Client review call')">👥 Client review call</button>
        <button class="btn btn-secondary" style="text-align:left" onclick="quickAdd('deliverable','Weekly report')">📦 Weekly report</button>
        <button class="btn btn-secondary" style="text-align:left" onclick="quickAdd('deliverable','Project proposal')">📦 Project proposal</button>
        <button class="btn btn-secondary" style="text-align:left" onclick="quickAdd('deliverable','Code review')">📦 Code review</button>
        <button class="btn btn-secondary" style="text-align:left" onclick="quickAdd('learning','Read article/book')">📚 Read article/book</button>
        <button class="btn btn-secondary" style="text-align:left" onclick="quickAdd('learning','Online course')">📚 Online course</button>
        <button class="btn btn-secondary" style="text-align:left" onclick="quickAdd('learning','Tutorial/practice')">📚 Tutorial/practice</button>
      </div>
    </div>
  `;
}

window.setCaptureType = function(type){
  captureType = type;
  renderCapture();
};

window.quickAdd = function(type, title){
  captureType = type;
  renderCapture();
  setTimeout(() => {
    document.getElementById('cap-title').value = title;
    document.getElementById('cap-title').focus();
  }, 50);
};

window.clearCaptureForm = function(){
  document.getElementById('cap-title').value = '';
  document.getElementById('cap-project').value = '';

    type: captureType,
    title,
    project: document.getElementById('cap-project').value.trim(),
    priority: document.getElementById('cap-priority').value,
    dueDate: document.getElementById('cap-due').value || null,

    completed: false,

  };

// ============ VIEW: COACH ============
function renderCoach(){
  const pending = state.tasks.filter(t => !t.completed);
  const allByType = {meeting:[], deliverable:[], learning:[]};
  pending.forEach(t => allByType[t.type] && allByType[t.type].push(t));
  
  // Coach suggestions by task type
  const meetingTips = [
    "Send agenda 24h ahead — meetings without agendas run 30% longer",
    "Default to 25/50 min instead of 30/60 — gives buffer for context switching",
    "End every meeting with: who owns what, by when, success metric",
    "If it could be an email, kill the meeting and write the email"
  ];
  const deliverableTips = [
    "Define 'done' criteria before starting — prevents scope creep",
    "Time-box at 90 min blocks with full-focus deep work, phone in another room",
    "First draft = ugly draft. Edit on the second pass, not the first",
    "If stuck > 20 min, write what you know + the specific gap, then ask"
  ];
  const learningTips = [
    "Active recall beats re-reading 3x — close the tab and write what you learned",
    "Teach it to a rubber duck (or colleague) within 24h to lock it in",
    "Apply within 7 days or lose 70% of the value (forgetting curve)",
    "Pick depth over breadth — 1 deep concept > 5 shallow tutorials"
  ];
  
  function pickTip(tips){return tips[Math.floor(Math.random() * tips.length)]}
  
  let suggestions = '';
  
  if(pending.length === 0){
    suggestions = `
      <div class="empty">
        <div class="icon">🎯</div>
        <div>No pending tasks to coach on. Add a task to get personalized suggestions.</div>
      </div>
    `;
  } else {
    const next = pending.sort((a,b) => {
      const order = {high:1, medium:2, low:3};
      return (order[a.priority]||2) - (order[b.priority]||2);
    })[0];
    
    let nextTip = '';
    if(next.type === 'meeting') nextTip = pickTip(meetingTips);
    else if(next.type === 'deliverable') nextTip = pickTip(deliverableTips);
    else nextTip = pickTip(learningTips);
    
    suggestions += `
      <div class="agent-message coach">
        <div class="agent-header">💡 <span class="agent-name">Top priority right now</span></div>
        <div class="agent-body">
          <strong>${escapeHtml(next.title)}</strong> (${next.type}, ${next.priority} priority)
          <br><br>
          <strong>Coach's advice:</strong><br>
          ${nextTip}
        </div>
      </div>
    `;
    
    // Patterns from completed tasks
    const completed = state.tasks.filter(t => t.completed);
    if(completed.length >= 3){
      const completedByType = {meeting:0, deliverable:0, learning:0};
      completed.forEach(t => completedByType[t.type]++);
      const dominant = Object.keys(completedByType).reduce((a,b) => completedByType[a] > completedByType[b] ? a : b);
      const ratio = (completedByType[dominant] / completed.length * 100).toFixed(0);
      
      let patternInsight = '';
      if(dominant === 'meeting' && ratio > 50){
        patternInsight = `Over half of your completed work is meetings (${ratio}%). Consider: are these creating output, or just maintenance overhead? Try blocking 2 hours of "no-meeting time" daily for deliverables.`;
      } else if(dominant === 'deliverable' && ratio > 50){
        patternInsight = `You're heavy on shipping (${ratio}% deliverables). Make sure you're investing in learning — 10% of time on growth pays compound returns.`;
      } else if(dominant === 'learning' && ratio > 40){
        patternInsight = `Strong learning habit (${ratio}% of completed work). Now: how are you converting learning into shipped deliverables? Pair each course with a project.`;
      } else {
        patternInsight = `Healthy mix: ${completedByType.meeting} meetings, ${completedByType.deliverable} deliverables, ${completedByType.learning} learning items. Keep this balance.`;
      }
      
      suggestions += `
        <div class="agent-message coach">
          <div class="agent-header">💡 <span class="agent-name">Pattern observation</span></div>
          <div class="agent-body">${patternInsight}</div>
        </div>
      `;
    }
    
    // Type-specific batch advice
    if(allByType.meeting.length >= 3){
      suggestions += `
        <div class="agent-message coach">
          <div class="agent-header">💡 <span class="agent-name">${allByType.meeting.length} meetings pending</span></div>
          <div class="agent-body">
            Batch your meetings — cluster them on 2 days max so the other days protect deep work.
            ${pickTip(meetingTips)}
          </div>
        </div>
      `;
    }
    if(allByType.deliverable.length >= 3){
      suggestions += `
        <div class="agent-message coach">
          <div class="agent-header">💡 <span class="agent-name">${allByType.deliverable.length} deliverables pending</span></div>
          <div class="agent-body">
            Stack-rank by impact × urgency. Knock out the highest-impact one first when your energy is highest (usually morning).
            ${pickTip(deliverableTips)}
          </div>
        </div>
      `;
    }
    if(allByType.learning.length >= 2){
      suggestions += `
        <div class="agent-message coach">
          <div class="agent-header">💡 <span class="agent-name">${allByType.learning.length} learning items pending</span></div>
          <div class="agent-body">
            Pair each one with a real task where you'll apply it. Learning without application is entertainment.
            ${pickTip(learningTips)}
          </div>
        </div>
      `;
    }
  }
  
  document.getElementById('view-coach').innerHTML = `
    <div class="panel">
      <div class="panel-title">💡 COACH AGENT · DO IT BETTER, FASTER</div>
      ${suggestions}
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(0,212,255,0.15);font-size:11px;color:#5a6f93;letter-spacing:0.5px">
        💭 Suggestions refresh each time you visit. Click the tab again for fresh angles.
      </div>
    </div>
  `;
}

// ============ VIEW: ANALYST ============
let analystPeriod = 'week';

function renderAnalyst(){
  const periods = [
    {id:'week', label:'This Week'},
    {id:'month', label:'This Month'},
    {id:'year', label:'This Year'},
    {id:'all', label:'All Time'}
  ];
  
  // Filter tasks by period
  function inPeriod(dateStr){
    if(!dateStr) return false;
    const d = new Date(dateStr);
    const now = new Date();
    if(analystPeriod === 'all') return true;
    if(analystPeriod === 'week'){
      const start = new Date(now);
      start.setDate(now.getDate() - now.getDay());
      start.setHours(0,0,0,0);
      return d >= start;
    }
    if(analystPeriod === 'month'){
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }
    if(analystPeriod === 'year'){
      return d.getFullYear() === now.getFullYear();
    }
    return false;
  }
  
  const completed = state.tasks.filter(t => t.completed && inPeriod(t.completedAt));
  const created = state.tasks.filter(t => inPeriod(t.createdAt));
  const totalHours = completed.reduce((s,t) => s + (parseFloat(t.timeSpent) || 0), 0);
  
  const byType = {meeting:0, deliverable:0, learning:0};
  const hoursByType = {meeting:0, deliverable:0, learning:0};
  completed.forEach(t => {
    byType[t.type] = (byType[t.type] || 0) + 1;
    hoursByType[t.type] = (hoursByType[t.type] || 0) + (parseFloat(t.timeSpent) || 0);
  });
  
  const completionRate = created.length > 0 ? ((completed.length / created.length) * 100).toFixed(0) : 0;
  
  // Build the bar chart
  const maxCount = Math.max(byType.meeting, byType.deliverable, byType.learning, 1);
  const chartHtml = `
    <div class="chart-container">
      <div class="chart-row">
        <div class="chart-label">Meetings</div>
        <div class="chart-bar-wrap"><div class="chart-bar meeting" style="width:${(byType.meeting/maxCount*100)}%"></div></div>
        <div class="chart-value">${byType.meeting}</div>
      </div>
      <div class="chart-row">
        <div class="chart-label">Deliverables</div>
        <div class="chart-bar-wrap"><div class="chart-bar deliverable" style="width:${(byType.deliverable/maxCount*100)}%"></div></div>
        <div class="chart-value">${byType.deliverable}</div>
      </div>
      <div class="chart-row">
        <div class="chart-label">Learning</div>
        <div class="chart-bar-wrap"><div class="chart-bar learning" style="width:${(byType.learning/maxCount*100)}%"></div></div>
        <div class="chart-value">${byType.learning}</div>
      </div>
    </div>
  `;
  
  // Top projects
  const byProject = {};
  completed.forEach(t => {
    if(t.project){
      byProject[t.project] = (byProject[t.project] || 0) + 1;
    }
  });
  const topProjects = Object.entries(byProject).sort((a,b) => b[1] - a[1]).slice(0, 5);
  
  // Generate insights
  let insights = '';
  if(completed.length === 0){
    insights = `<div class="agent-body">Not enough data in this period to generate insights. Complete some tasks to unlock analysis.</div>`;
  } else {
    const insightList = [];
    
    if(byType.meeting > byType.deliverable * 1.5){
      insightList.push(`⚠️ Meetings (${byType.meeting}) are outpacing deliverables (${byType.deliverable}). You may be over-coordinating.`);
    } else if(byType.deliverable > byType.meeting * 2){
      insightList.push(`✅ Strong output focus: ${byType.deliverable} deliverables vs ${byType.meeting} meetings.`);
    }
    
    if(byType.learning === 0 && completed.length > 5){
      insightList.push(`📚 Zero learning logged this period. Block time for growth — even 1 hour/week compounds.`);
    } else if(byType.learning >= completed.length * 0.2){
      insightList.push(`✅ Learning investment is healthy (${(byType.learning/completed.length*100).toFixed(0)}% of activity).`);
    }
    
    if(completionRate < 60 && created.length > 5){
      insightList.push(`⚠️ Completion rate is ${completionRate}% — you're creating tasks faster than finishing them. Be selective.`);
    } else if(completionRate >= 80){
      insightList.push(`✅ Excellent completion rate at ${completionRate}% — strong follow-through.`);
    }
    
    if(totalHours > 0 && analystPeriod === 'week'){
      const expectedWeekHours = state.settings.workHoursPerDay * 5;
      const efficiency = (totalHours / expectedWeekHours * 100).toFixed(0);
      insightList.push(`⏱ Logged ${totalHours.toFixed(1)}h of tracked work (${efficiency}% of available work hours).`);
    }
    
    if(topProjects.length > 0){
      insightList.push(`🎯 Most active project: <strong>${escapeHtml(topProjects[0][0])}</strong> with ${topProjects[0][1]} completed tasks.`);
    }
    
    insights = `<ul>${insightList.map(i => `<li>${i}</li>`).join('')}</ul>`;
  }
  
  // Outcome forecast
  let forecast = '';
  if(completed.length >= 5 && analystPeriod !== 'all'){
    const periodLabel = analystPeriod === 'week' ? 'next week' : analystPeriod === 'month' ? 'next month' : 'next year';
    const projection = analystPeriod === 'week' ? completed.length : completed.length;
    forecast = `
      <div class="agent-message analyst">
        <div class="agent-header">📈 <span class="agent-name">Outcome forecast</span></div>
        <div class="agent-body">
          At your current pace, you're on track for approximately <strong>${projection}</strong> completed tasks ${periodLabel}.
          ${byType.deliverable > 0 ? `Roughly ${Math.round(byType.deliverable * (analystPeriod === 'week' ? 4 : 12))} deliverables shipped if you keep this up.` : ''}
        </div>
      </div>
    `;
  }
  
  document.getElementById('view-analyst').innerHTML = `
    <div class="panel">
      <div class="panel-title">📈 ANALYST AGENT · PERFORMANCE REVIEW</div>
      <div class="filter-bar">
        ${periods.map(p => `<button class="filter-chip ${analystPeriod===p.id?'active':''}" onclick="setAnalystPeriod('${p.id}')">${p.label}</button>`).join('')}
      </div>
      
      <div class="dashboard-grid">
        <div class="stat-card success"><div class="label">Completed</div><div class="number">${completed.length}</div></div>
        <div class="stat-card"><div class="label">Hours Logged</div><div class="number">${totalHours.toFixed(1)}</div></div>
        <div class="stat-card warning"><div class="label">Completion Rate</div><div class="number">${completionRate}%</div></div>
        <div class="stat-card"><div class="label">Created</div><div class="number">${created.length}</div></div>
      </div>
      
      <div class="agent-message analyst">
        <div class="agent-header">📈 <span class="agent-name">Activity breakdown</span></div>
        <div class="agent-body">
          ${chartHtml}
        </div>
      </div>
      
      ${topProjects.length > 0 ? `
        <div class="agent-message analyst">
          <div class="agent-header">📈 <span class="agent-name">Top projects</span></div>
          <div class="agent-body">
            <ul>${topProjects.map(([p,c]) => `<li><strong>${escapeHtml(p)}</strong> — ${c} task${c>1?'s':''}</li>`).join('')}</ul>
          </div>
        </div>
      ` : ''}
      
      <div class="agent-message analyst">
        <div class="agent-header">📈 <span class="agent-name">Insights & observations</span></div>
        ${insights}
      </div>
      
      ${forecast}
    </div>
  `;
}

window.setAnalystPeriod = function(p){
  analystPeriod = p;
  renderAnalyst();
};

window.saveSettings = function(){
  state.settings.userName = document.getElementById('set-name').value.trim() || 'Sir';
  state.settings.workHoursPerDay = parseInt(document.getElementById('set-hours').value) || 8;
  state.settings.goals = document.getElementById('set-goals').value.trim();
  saveState();
  alert('Settings saved.');
};

window.exportData = function(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `jarvis-backup-${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
};

window.importData = function(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if(!imported.tasks){alert('Invalid backup file'); return}
      if(!confirm(`Import ${imported.tasks.length} tasks? This will replace your current data.`)) return;
      state = imported;
      saveState();
      renderCurrentView();
      updateHeaderStats();
      alert('Data imported successfully.');
    } catch(err){
      alert('Error importing: ' + err.message);
    }
  };
  reader.readAsText(file);
};

window.resetData = function(){
  if(!confirm('This will delete ALL your tasks and settings. Are you sure?')) return;
  if(!confirm('Really sure? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = loadState();
  renderCurrentView();
  updateHeaderStats();
  alert('All data has been reset.');
};

  {idea: "Identify a cross-functional pain point and propose a fix", why: "career rocket fuel — solving others' problems"},
  {idea: "Set up automated metrics dashboard for your work", why: "easier reviews, clearer wins"},
  {idea: "Coach/mentor someone junior", why: "teaching is the deepest form of learning"}
];

function getPersonalizedIdeas(){
  // Personalize based on what user is doing
  const completed = state.tasks.filter(t => t.completed);
  const recentTypes = {meeting:0, deliverable:0, learning:0};
  completed.slice(-10).forEach(t => recentTypes[t.type]++);
  
  // Get 1 random learning idea
  const learningIdea = LEARNING_IDEAS[Math.floor(Math.random() * LEARNING_IDEAS.length)];
  
  // Get 1 random value-add idea
  const valueIdea = VALUE_ADD_IDEAS[Math.floor(Math.random() * VALUE_ADD_IDEAS.length)];
  
  // Contextual nudge based on patterns
  let nudge = '';
  if(recentTypes.meeting > recentTypes.deliverable * 2 && completed.length > 5){
    nudge = "You're heavy on meetings lately — try blocking 2 hours of no-meeting deep work tomorrow.";
  } else if(recentTypes.learning === 0 && completed.length > 5){
    nudge = "No learning logged recently. 1 hour of focused growth pays back for years.";
  } else if(recentTypes.deliverable > 5 && recentTypes.learning < 2){
    nudge = "Strong shipping pace. Time to invest in growth — pick one skill to level up this month.";
  } else {
    nudge = "Solid mix across activity types. Keep this rhythm.";
  }
  
  return {learningIdea, valueIdea, nudge};
}

// ============ VOICE ASSISTANT ============
let recognition = null;
let voiceEnabled = false;
let voicesLoaded = false;
let preferredVoice = null;

// Load voices and pick the best JARVIS-sounding one
function loadVoices(){
  const voices = window.speechSynthesis.getVoices();
  if(voices.length === 0) return;
  
  // Try to find a British male voice (JARVIS sounds British)
  preferredVoice = voices.find(v => v.name.match(/Daniel|Google UK English Male|Microsoft George|Oliver/i))
                || voices.find(v => v.lang === 'en-GB' && v.name.toLowerCase().includes('male'))
                || voices.find(v => v.lang === 'en-GB')
                || voices.find(v => v.lang.startsWith('en'))
                || voices[0];
  voicesLoaded = true;
}

if('speechSynthesis' in window){
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text){
  if(!('speechSynthesis' in window)) return;
  
  // Cancel any ongoing speech
  window.speechSynthesis.cancel();
  
  // Strip HTML for clean speech
  const cleanText = text.replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim();
  
  const utterance = new SpeechSynthesisUtterance(cleanText);
  if(preferredVoice) utterance.voice = preferredVoice;
  utterance.rate = 1.0;
  utterance.pitch = 0.9;  // Slightly lower = more JARVIS
  utterance.volume = 1.0;
  
  window.speechSynthesis.speak(utterance);
}

function showVoiceOverlay(show, transcript){
  const overlay = document.getElementById('voice-overlay');
  const transcriptEl = document.getElementById('voice-transcript');
  if(show){
    overlay.classList.add('show');
    if(transcript) transcriptEl.textContent = transcript;
  } else {
    overlay.classList.remove('show');
    transcriptEl.textContent = '';
  }
}

function setArcReactorListening(listening){
  const reactor = document.getElementById('arc-reactor');
  if(listening) reactor.classList.add('listening');
  else reactor.classList.remove('listening');
}

function generateJarvisBriefing(){
  const userName = state.settings.userName || 'Sir';
  const pending = state.tasks.filter(t => !t.completed);
  const overdue = state.tasks.filter(t => isOverdue(t));
  const todayTasks = state.tasks.filter(t => isToday(t.dueDate) && !t.completed);
  const deliverables = pending.filter(t => t.type === 'deliverable');
  const meetings = pending.filter(t => t.type === 'meeting');
  
  const {learningIdea, valueIdea, nudge} = getPersonalizedIdeas();
  
  let spokenText = `Good day, ${userName}. `;
  let displayText = `<strong>Good day, ${userName}.</strong><br><br>`;
  
  // Deliverables briefing
  if(deliverables.length === 0){
    spokenText += "You have no pending deliverables. ";
    displayText += "✅ No pending deliverables.<br>";
  } else {
    const top3 = deliverables.slice(0, 3);
    spokenText += `You have ${deliverables.length} pending deliverable${deliverables.length>1?'s':''}. `;
    displayText += `📦 <strong>${deliverables.length} pending deliverable${deliverables.length>1?'s':''}:</strong><ul>`;
    top3.forEach(t => {
      const dueTxt = t.dueDate ? `, due ${formatDate(t.dueDate)}` : '';
      spokenText += `${t.title}${dueTxt}. `;
      displayText += `<li>${escapeHtml(t.title)}${dueTxt}</li>`;
    });
    displayText += '</ul>';
  }
  
  // Overdue alert
  if(overdue.length > 0){
    spokenText += `Warning: ${overdue.length} ${overdue.length>1?'tasks are':'task is'} overdue and require${overdue.length>1?'':'s'} immediate attention. `;
    displayText += `<br>⚠️ <strong>${overdue.length} overdue ${overdue.length>1?'tasks':'task'}</strong> requiring attention.<br>`;
  }
  
  // Today's meetings
  if(meetings.length > 0){
    const todayMeetings = meetings.filter(m => isToday(m.dueDate));
    if(todayMeetings.length > 0){
      spokenText += `You have ${todayMeetings.length} meeting${todayMeetings.length>1?'s':''} today. `;
      displayText += `<br>👥 <strong>${todayMeetings.length} meeting${todayMeetings.length>1?'s':''} today.</strong><br>`;
    }
  }
  
  // Learning suggestion
  spokenText += `My suggestion for learning: explore ${learningIdea.topic}. ${learningIdea.why}. `;
  displayText += `<br>💡 <strong>Learning suggestion:</strong><br>Explore <strong>${learningIdea.topic}</strong> — ${learningIdea.why}.<br>`;
  
  // Value-add suggestion
  spokenText += `For value add: ${valueIdea.idea}. ${valueIdea.why}. `;
  displayText += `<br>🎯 <strong>Value-add idea:</strong><br>${valueIdea.idea} — ${valueIdea.why}.<br>`;
  
  // Contextual nudge
  spokenText += nudge;
  displayText += `<br>📊 <strong>Observation:</strong> ${nudge}`;
  
  return {spokenText, displayText};
}

function jarvisBriefingResponse(){
  const {spokenText, displayText} = generateJarvisBriefing();
  
  // Switch to dashboard view to show the message
  showView('dashboard');
  
  // Insert the response at the top of dashboard
  setTimeout(() => {
    const dashboardView = document.getElementById('view-dashboard');
    const responseHtml = `
      <div class="panel" id="jarvis-voice-response">
        <div class="panel-title">🎙️ JARVIS RESPONSE · VOICE BRIEFING</div>
        <div class="agent-message jarvis-voice">
          <div class="agent-header">🤖 <span class="agent-name">JARVIS</span></div>
          <div class="agent-body">${displayText}</div>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('jarvis-voice-response').remove()">Dismiss</button>
        <button class="btn btn-sm" onclick="jarvisBriefingResponse()" style="margin-left:8px">🎙️ Repeat</button>
      </div>
    `;
    
    // Remove old response if any
    const old = document.getElementById('jarvis-voice-response');
    if(old) old.remove();
    
    dashboardView.insertAdjacentHTML('afterbegin', responseHtml);
  }, 100);
  
  // Speak it
  speak(spokenText);
}

window.jarvisBriefingResponse = jarvisBriefingResponse;

function initVoiceRecognition(){
  // Check browser support
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    return null;
  }
  
  const rec = new SpeechRecognition();
  rec.continuous = true;
  rec.interimResults = true;
  rec.lang = 'en-US';
  
  rec.onresult = (event) => {
    let interim = '';
    let final = '';
    for(let i = event.resultIndex; i < event.results.length; i++){
      const transcript = event.results[i][0].transcript;
      if(event.results[i].isFinal){
        final += transcript;
      } else {
        interim += transcript;
      }
    }
    
    const fullText = (final + interim).toLowerCase().trim();
    showVoiceOverlay(true, final || interim);
    
    // Check for wake words
    if(fullText.match(/\b(hi|hey|hello|ok)\s+jarvis\b/) || 
       fullText.match(/\bjarvis\b.*\b(brief|update|status|deliverables|tasks|hello|hi)\b/)){
      // Trigger briefing
      console.log('Wake word detected:', fullText);
      jarvisBriefingResponse();
      
      // Reset recognition to avoid retriggering on same phrase
      rec.stop();
      setTimeout(() => {
        if(voiceEnabled){
          try { rec.start(); } catch(e) {}
        }
      }, 4000);  // 4 sec cooldown
    }
  };
  
  rec.onerror = (event) => {
    console.error('Voice error:', event.error);
    if(event.error === 'not-allowed'){
      alert('Microphone access denied. Click the mic icon in your browser address bar to allow.');
      stopVoiceListening();
    } else if(event.error === 'no-speech'){
      // Normal — restart silently
    }
  };
  
  rec.onend = () => {
    setArcReactorListening(false);
    if(voiceEnabled){
      // Auto-restart if still active
      try { rec.start(); setArcReactorListening(true); } catch(e) {}
    } else {
      showVoiceOverlay(false);
    }
  };
  
  rec.onstart = () => {
    setArcReactorListening(true);
    showVoiceOverlay(true);
  };
  
  return rec;
}

function startVoiceListening(){
  if(!recognition){
    recognition = initVoiceRecognition();
    if(!recognition){
      alert('Voice recognition is not supported in this browser. Try Chrome, Edge, or Safari.');
      return;
    }
  }
  
  voiceEnabled = true;
  try {
    recognition.start();
  } catch(e){
    // Already started
    console.log('Recognition already running');
  }
  
  const btn = document.getElementById('voice-toggle');
  const txt = document.getElementById('voice-toggle-text');
  btn.classList.add('active');
  txt.textContent = 'Listening...';
  
  // Welcome message
  speak("JARVIS voice protocol activated. Say 'Hi JARVIS' anytime for a briefing.");
}

function stopVoiceListening(){
  voiceEnabled = false;
  if(recognition){
    try { recognition.stop(); } catch(e) {}
  }
  setArcReactorListening(false);
  showVoiceOverlay(false);
  
  const btn = document.getElementById('voice-toggle');
  const txt = document.getElementById('voice-toggle-text');
  btn.classList.remove('active');
  txt.textContent = 'Activate Voice';
  
  window.speechSynthesis.cancel();
}

window.toggleVoice = function(){
  if(voiceEnabled){
    stopVoiceListening();
  } else {
    startVoiceListening();
  }
};

// ============ ROUTING ============
function renderCurrentView(){
  const activeTab = document.querySelector('.tab.active');
  if(!activeTab) return;
  const view = activeTab.dataset.view;
  if(view === 'dashboard') renderDashboard();
  else if(view === 'capture') renderCapture();
  else if(view === 'tracker') renderTracker();
  else if(view === 'coach') renderCoach();
  else if(view === 'analyst') renderAnalyst();
  else if(view === 'settings') renderSettings();
}

// ============ INIT ============
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => showView(tab.dataset.view));
});

// Voice toggle button
document.getElementById('voice-toggle').addEventListener('click', window.toggleVoice);

updateHeaderStats();
renderCurrentView();
</script>
